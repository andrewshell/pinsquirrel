services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: pinsquirrel
      MYSQL_USER: pinsquirrel
      MYSQL_PASSWORD: pinsquirrel
      MYSQL_ROOT_PASSWORD: pinsquirrel
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
